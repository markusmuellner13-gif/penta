<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6aaa64"/>
      <stop offset="1" stop-color="#538d4e"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f1f1f1"/>
    </linearGradient>
  </defs>
  <!-- background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- faint tile-grid texture in the safe area -->
  <g fill="none" stroke="rgba(255,255,255,0.14)" stroke-width="6">
    <rect x="120" y="120" width="80" height="80" rx="12"/>
    <rect x="216" y="120" width="80" height="80" rx="12"/>
    <rect x="312" y="120" width="80" height="80" rx="12"/>
    <rect x="120" y="312" width="80" height="80" rx="12"/>
    <rect x="312" y="312" width="80" height="80" rx="12"/>
  </g>
  <!-- center hero tile with the P -->
  <rect x="196" y="196" width="120" height="120" rx="20" fill="url(#tile)"/>
  <text x="256" y="298" font-family="Helvetica, Arial, sans-serif" font-weight="800"
        font-size="104" text-anchor="middle" fill="#538d4e">P</text>
</svg>
